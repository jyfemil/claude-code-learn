<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Engineering — Knowledge Graph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --bg-page: #f8f9fc;
  --bg-surface: #ffffff;
  --bg-card: #ffffff;
  --bg-card-hover: #f0f2f8;
  --border: #e2e5ef;
  --border-hover: #c8cce0;
  --text-primary: #1a1d2e;
  --text-secondary: #5a6080;
  --text-muted: #9098b8;
  --node-unlearned-bg: #f0f1f6;
  --node-unlearned-border: #dfe2ec;
  --node-unlearned-text: #8890a8;
  --color-cyan: #0891b2;
  --color-violet: #7c3aed;
  --color-amber: #d97706;
  --color-emerald: #059669;
  --color-blue: #2563eb;
  --color-rose: #e11d48;
  --phase1-color: #0891b2;
  --phase2-color: #7c3aed;
  --phase3-color: #d97706;
  --mastered-color: #059669;
  --inprogress-color: #2563eb;
  --font-display: 'Outfit', sans-serif;
  --font-body: 'Noto Sans SC', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg-page);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: auto;
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px) saturate(1.3);
  border-bottom: 1px solid var(--border);
  padding: 0.9rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-shrink: 0;
}

.header-logo {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.25rem;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--color-cyan), var(--color-violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-subtitle {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.stats-badge {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-secondary);
  background: var(--bg-page);
  border: 1px solid var(--border);
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.stats-badge .count {
  color: var(--mastered-color);
  font-weight: 600;
}

.btn {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  font-weight: 500;
  padding: 0.45rem 0.9rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn:hover {
  border-color: var(--border-hover);
  color: var(--text-primary);
  background: var(--bg-card-hover);
}

.btn-edit { border-color: rgba(8,145,178,0.4); color: var(--color-cyan); }
.btn-edit:hover { background: rgba(8,145,178,0.06); border-color: var(--color-cyan); }
.btn-edit.active { background: rgba(8,145,178,0.1); border-color: var(--color-cyan); color: var(--color-cyan); box-shadow: 0 0 0 3px rgba(8,145,178,0.1); }

.btn-save { border-color: rgba(5,150,105,0.4); color: var(--mastered-color); }
.btn-save:hover { background: rgba(5,150,105,0.06); border-color: var(--mastered-color); }

.btn-collapse { border-color: rgba(124,58,237,0.3); color: var(--color-violet); }
.btn-collapse:hover { background: rgba(124,58,237,0.06); border-color: var(--color-violet); }

/* ===== LEGEND ===== */
.legend {
  display: flex;
  align-items: center;
  gap: 1.2rem;
  padding: 0.7rem 2rem;
  border-bottom: 1px solid var(--border);
  background: rgba(248,249,252,0.8);
  position: sticky;
  top: 56px;
  z-index: 99;
  overflow-x: auto;
  flex-wrap: nowrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-secondary);
  white-space: nowrap;
  flex-shrink: 0;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-dot.unlearned { background: var(--node-unlearned-bg); border: 1.5px solid var(--node-unlearned-border); }
.legend-dot.inprogress { background: var(--inprogress-color); }
.legend-dot.mastered { background: var(--mastered-color); }
.legend-dot.phase1 { background: var(--phase1-color); }
.legend-dot.phase2 { background: var(--phase2-color); }
.legend-dot.phase3 { background: var(--phase3-color); }

.legend-hint {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-left: auto;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ===== GRAPH CONTAINER ===== */
.graph-container {
  position: relative;
  z-index: 1;
  padding: 2.5rem 2rem 6rem;
  overflow-x: auto;
  min-height: calc(100vh - 120px);
}

.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  min-width: fit-content;
}

/* ===== ROOT NODE ===== */
.root-node {
  position: relative;
  margin-bottom: 2.5rem;
}

.root-node .node-card {
  background: linear-gradient(135deg, rgba(8,145,178,0.05), rgba(124,58,237,0.05));
  border: 1.5px solid rgba(8,145,178,0.2);
  padding: 1.2rem 2.5rem;
  border-radius: 14px;
  text-align: center;
  cursor: default;
}

.root-node .node-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.5rem;
  background: linear-gradient(135deg, var(--color-cyan), var(--color-violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.root-node .node-subtitle {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 0.3rem;
}

/* ===== TIER ROW ===== */
.tier {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 2rem;
  width: 100%;
}

.tier-label {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.35rem 1.1rem;
  border-radius: 20px;
  margin-bottom: 1.3rem;
}

.tier-label.phase1 { color: var(--phase1-color); background: rgba(8,145,178,0.07); border: 1px solid rgba(8,145,178,0.2); }
.tier-label.phase2 { color: var(--phase2-color); background: rgba(124,58,237,0.07); border: 1px solid rgba(124,58,237,0.2); }
.tier-label.phase3 { color: var(--phase3-color); background: rgba(217,119,6,0.07); border: 1px solid rgba(217,119,6,0.2); }
.tier-label.mastered { color: var(--mastered-color); background: rgba(5,150,105,0.07); border: 1px solid rgba(5,150,105,0.2); }

.tier-nodes {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 1400px;
}

/* ===== BRANCH ===== */
.branch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.branch-connector {
  width: 1.5px;
  height: 14px;
  background: var(--border);
  transition: background 0.5s;
}

.branch.has-mastered > .branch-connector { background: var(--mastered-color); }
.branch.has-inprogress > .branch-connector { background: var(--inprogress-color); }

/* ===== NODE CARD ===== */
.node-card {
  position: relative;
  background: var(--node-unlearned-bg);
  border: 1.5px solid var(--node-unlearned-border);
  border-radius: 12px;
  padding: 1.1rem 1.4rem;
  min-width: 200px;
  max-width: 240px;
  text-align: center;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  cursor: pointer;
  overflow: visible;
  user-select: none;
}

.node-card:hover {
  border-color: var(--border-hover);
  background: #eceef5;
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}

.node-card .node-icon {
  font-size: 1.6rem;
  margin-bottom: 0.5rem;
  filter: grayscale(0.7) opacity(0.5);
  transition: all 0.5s;
}

.node-card .node-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1rem;
  color: var(--node-unlearned-text);
  transition: color 0.4s;
  margin-bottom: 0.25rem;
}

.node-card .node-desc {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-muted);
  line-height: 1.5;
}

/* ===== TOGGLE BUTTON ===== */
.node-toggle {
  position: absolute;
  bottom: -11px;
  left: 50%;
  transform: translateX(-50%);
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.55rem;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.25s;
  z-index: 5;
}

.node-toggle:hover {
  border-color: var(--border-hover);
  color: var(--text-secondary);
  transform: translateX(-50%) scale(1.15);
}

.node-toggle .toggle-icon {
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  display: inline-block;
  line-height: 1;
}

.node-toggle.collapsed .toggle-icon {
  transform: rotate(-90deg);
}

/* ===== CHILDREN COLLAPSE ===== */
.children-wrapper {
  display: grid;
  grid-template-rows: 1fr;
  transition: grid-template-rows 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
  opacity: 1;
}

.children-wrapper.collapsed {
  grid-template-rows: 0fr;
  opacity: 0;
}

.children-inner { overflow: hidden; }

.children {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 260px;
  padding-top: 1rem;
}

.child-node {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  padding: 0.35rem 0.7rem;
  border-radius: 5px;
  background: var(--node-unlearned-bg);
  border: 1px solid var(--node-unlearned-border);
  color: var(--node-unlearned-text);
  cursor: default;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  white-space: nowrap;
  user-select: none;
}

/* ===== EDIT MODE ===== */
body.edit-mode .node-card { cursor: pointer; }
body.edit-mode .node-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
body.edit-mode .child-node { cursor: pointer; }
body.edit-mode .child-node:hover { background: #e4e7f2; border-color: var(--border-hover); color: var(--text-secondary); transform: translateY(-1px); }

/* ===== IN-PROGRESS STATE ===== */
.node-card.inprogress {
  background: rgba(37,99,235,0.04);
  border-color: rgba(37,99,235,0.35);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.06);
}

.node-card.inprogress .node-icon { filter: none; }
.node-card.inprogress .node-title { color: var(--inprogress-color); }
.node-card.inprogress .node-desc { color: var(--text-secondary); }

.child-node.inprogress {
  background: rgba(37,99,235,0.06);
  border-color: rgba(37,99,235,0.3);
  color: var(--inprogress-color);
}

/* pulse ring for in-progress */
.node-card.inprogress::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 14px;
  border: 2px solid rgba(37,99,235,0.15);
  animation: progressPulse 2.5s ease-in-out infinite;
  pointer-events: none;
}

@keyframes progressPulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.01); }
}

/* ===== MASTERED STATE ===== */
.node-card.mastered {
  background: rgba(5,150,105,0.04);
  border-color: rgba(5,150,105,0.35);
  box-shadow: 0 0 0 3px rgba(5,150,105,0.06), 0 4px 16px rgba(5,150,105,0.08);
}

.node-card.mastered::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 13px;
  padding: 1.5px;
  background: linear-gradient(135deg, var(--mastered-color), var(--color-cyan), var(--color-violet));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: borderShift 5s linear infinite;
  pointer-events: none;
}

.node-card.mastered .node-icon { filter: none; animation: iconFloat 3s ease-in-out infinite; }
.node-card.mastered .node-title { color: var(--mastered-color); }
.node-card.mastered .node-desc { color: var(--text-secondary); }

.child-node.mastered {
  background: rgba(5,150,105,0.07);
  border-color: rgba(5,150,105,0.3);
  color: var(--mastered-color);
  font-weight: 500;
}

/* Phase glow overrides for mastered */
.node-card.mastered.phase1-glow { border-color: rgba(8,145,178,0.35); box-shadow: 0 0 0 3px rgba(8,145,178,0.06), 0 4px 16px rgba(8,145,178,0.08); }
.node-card.mastered.phase1-glow .node-title { color: var(--phase1-color); }
.node-card.mastered.phase1-glow::before { background: linear-gradient(135deg, var(--phase1-color), var(--mastered-color)); }

.node-card.mastered.phase2-glow { border-color: rgba(124,58,237,0.35); box-shadow: 0 0 0 3px rgba(124,58,237,0.06), 0 4px 16px rgba(124,58,237,0.08); }
.node-card.mastered.phase2-glow .node-title { color: var(--phase2-color); }
.node-card.mastered.phase2-glow::before { background: linear-gradient(135deg, var(--phase2-color), var(--mastered-color)); }

.node-card.mastered.phase3-glow { border-color: rgba(217,119,6,0.35); box-shadow: 0 0 0 3px rgba(217,119,6,0.06), 0 4px 16px rgba(217,119,6,0.08); }
.node-card.mastered.phase3-glow .node-title { color: var(--phase3-color); }
.node-card.mastered.phase3-glow::before { background: linear-gradient(135deg, var(--phase3-color), var(--mastered-color)); }

.node-card.mastered.mastered-glow { border-color: rgba(5,150,105,0.4); }
.node-card.mastered.mastered-glow .node-title { color: var(--mastered-color); }

/* ===== ANIMATIONS ===== */
@keyframes borderShift {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

@keyframes iconFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}

@keyframes ignite {
  0% { transform: scale(1); }
  20% { transform: scale(1.04); }
  40% { transform: scale(1); }
}

@keyframes particleBurst {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

.node-card.just-changed { animation: ignite 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

.particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: visible;
  z-index: 10;
}

.particle {
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  animation: particleBurst 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.particle.emerald { background: var(--mastered-color); box-shadow: 0 0 6px var(--mastered-color); }
.particle.blue { background: var(--inprogress-color); box-shadow: 0 0 6px var(--inprogress-color); }

/* ===== PROGRESS BAR ===== */
.progress-container {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0.7rem 1.4rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  min-width: 340px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}

.progress-bar-track {
  flex: 1;
  height: 5px;
  background: var(--node-unlearned-bg);
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--inprogress-color), var(--mastered-color));
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.progress-text {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-secondary);
  white-space: nowrap;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  top: 4.5rem;
  right: 2rem;
  z-index: 200;
  background: var(--bg-surface);
  border: 1px solid rgba(5,150,105,0.3);
  border-radius: 8px;
  padding: 0.7rem 1.1rem;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--mastered-color);
  transform: translateX(120%);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.toast.show { transform: translateX(0); }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .tier-nodes { flex-direction: column; align-items: center; }
  .header { padding: 0.8rem 1rem; flex-wrap: wrap; }
  .graph-container { padding: 1.5rem 1rem 5rem; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">Knowledge Graph</div>
    <div class="header-subtitle">AI Agent Engineering</div>
  </div>
  <div class="header-right">
    <div class="stats-badge">
      <span class="count" id="masteredCount">0</span> mastered ·
      <span style="color:var(--inprogress-color);font-weight:600" id="inprogressCount">0</span> learning ·
      <span id="totalCount">0</span> total
    </div>
    <button class="btn btn-collapse" id="collapseBtn" onclick="toggleAllCollapse()">Collapse All</button>
    <button class="btn btn-edit" id="editBtn" onclick="toggleEditMode()">Edit Mode</button>
    <button class="btn btn-save" onclick="saveState()">Save</button>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot unlearned"></div>未学习</div>
  <div class="legend-item"><div class="legend-dot inprogress"></div>学习中</div>
  <div class="legend-item"><div class="legend-dot mastered"></div>已掌握</div>
  <div class="legend-item"><div class="legend-dot phase1"></div>Phase 1</div>
  <div class="legend-item"><div class="legend-dot phase2"></div>Phase 2</div>
  <div class="legend-item"><div class="legend-dot phase3"></div>Phase 3</div>
  <span class="legend-hint">点击节点展开/收缩 · Edit Mode 下点击切换状态</span>
</div>

<div class="graph-container">
  <div class="tree" id="tree"></div>
</div>

<div class="progress-container">
  <div class="progress-text" id="progressLabel">0%</div>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// States: 0 = unlearned, 1 = in-progress, 2 = mastered
const STATE_UNLEARNED = 0;
const STATE_INPROGRESS = 1;
const STATE_MASTERED = 2;

const knowledgeData = {
  root: { title: "AI Agent Engineering", subtitle: "From Claude Code internals to production audit agents" },
  phases: [
    {
      id: "mastered", label: "已掌握 — Mastered", labelClass: "mastered",
      nodes: [
        {
          id: "mcp-protocol", icon: "🔌", title: "MCP 协议", desc: "设计哲学与落地", phase: "mastered", defaultState: 2,
          children: [
            { id: "mcp-nxm", label: "N×M 问题", defaultState: 2 },
            { id: "mcp-primitives", label: "三大原语", defaultState: 2 },
            { id: "mcp-capability", label: "Capability Negotiation", defaultState: 2 },
            { id: "mcp-transport", label: "Transport 抽象", defaultState: 2 },
            { id: "mcp-security", label: "安全边界 & Sampling", defaultState: 2 }
          ]
        },
        {
          id: "agent-tracing", icon: "🔍", title: "Agent Tracing", desc: "可观测性三层模型", phase: "mastered", defaultState: 2,
          children: [
            { id: "trace-3layer", label: "三层模型", defaultState: 2 },
            { id: "trace-decision", label: "decision_context", defaultState: 2 },
            { id: "trace-input", label: "input_sources", defaultState: 2 },
            { id: "trace-workflow", label: "分析工作流", defaultState: 2 },
            { id: "trace-cot", label: "CoT 陷阱", defaultState: 2 }
          ]
        }
      ]

// ===== STATE =====
let state = {};
let collapsed = {};
let editMode = false;

function loadState() {
  try {
    const saved = localStorage.getItem('knowledge-graph-state-v3');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = parsed.mastery || {};
      collapsed = parsed.collapsed || {};
    } else {
      initStateFromData();
    }
  } catch (e) { initStateFromData(); }
}

function initStateFromData() {
  state = {};
  collapsed = {};
  knowledgeData.phases.forEach(phase => {
    phase.nodes.forEach(node => {
      state[node.id] = node.defaultState;
      collapsed[node.id] = false;
      node.children.forEach(child => { state[child.id] = child.defaultState; });
    });
  });
}

function saveState() {
  localStorage.setItem('knowledge-graph-state-v3', JSON.stringify({ mastery: state, collapsed, timestamp: new Date().toISOString() }));
  showToast('Progress saved');
}

function cycleState(current) {
  return (current + 1) % 3;
}

function getNodeStateClass(val) {
  if (val === STATE_INPROGRESS) return 'inprogress';
  if (val === STATE_MASTERED) return 'mastered';
  return '';
}

// ===== RENDER =====
function renderTree() {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';

  const rootEl = document.createElement('div');
  rootEl.className = 'root-node';
  rootEl.innerHTML = `<div class="node-card"><div class="node-title">${knowledgeData.root.title}</div><div class="node-subtitle">${knowledgeData.root.subtitle}</div></div>`;
  tree.appendChild(rootEl);

  knowledgeData.phases.forEach(phase => {
    const tierEl = document.createElement('div');
    tierEl.className = 'tier';

    const labelEl = document.createElement('div');
    labelEl.className = `tier-label ${phase.labelClass}`;
    labelEl.textContent = phase.label;
    tierEl.appendChild(labelEl);

    const nodesRow = document.createElement('div');
    nodesRow.className = 'tier-nodes';

    phase.nodes.forEach(node => {
      const branchEl = document.createElement('div');
      const nState = state[node.id] || 0;
      let branchClass = 'branch';
      if (nState === STATE_MASTERED) branchClass += ' has-mastered';
      else if (nState === STATE_INPROGRESS) branchClass += ' has-inprogress';
      branchEl.className = branchClass;

      const connectorEl = document.createElement('div');
      connectorEl.className = 'branch-connector';
      branchEl.appendChild(connectorEl);

      const cardEl = document.createElement('div');
      let cardClass = 'node-card';
      const stateClass = getNodeStateClass(nState);
      if (stateClass) cardClass += ` ${stateClass} ${node.phase}-glow`;
      cardEl.className = cardClass;
      cardEl.dataset.id = node.id;

      const isCollapsed = collapsed[node.id];

      cardEl.innerHTML = `
        <div class="particles"></div>
        <div class="node-icon">${node.icon}</div>
        <div class="node-title">${node.title}</div>
        <div class="node-desc">${node.desc}</div>
        <div class="node-toggle ${isCollapsed ? 'collapsed' : ''}" data-node="${node.id}">
          <span class="toggle-icon">▼</span>
        </div>
      `;

      cardEl.addEventListener('click', (e) => {
        if (e.target.closest('.node-toggle')) return;
        if (editMode) { handleNodeCycle(node.id, node.phase); }
        else { toggleCollapse(node.id); }
      });

      cardEl.querySelector('.node-toggle').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleCollapse(node.id);
      });

      branchEl.appendChild(cardEl);

      if (node.children && node.children.length > 0) {
        const wrapperEl = document.createElement('div');
        wrapperEl.className = `children-wrapper${isCollapsed ? ' collapsed' : ''}`;
        wrapperEl.dataset.parent = node.id;

        const innerEl = document.createElement('div');
        innerEl.className = 'children-inner';
        const childrenEl = document.createElement('div');
        childrenEl.className = 'children';

        node.children.forEach(child => {
          const childEl = document.createElement('div');
          const cState = state[child.id] || 0;
          let childClass = 'child-node';
          const cStateClass = getNodeStateClass(cState);
          if (cStateClass) childClass += ` ${cStateClass}`;
          childEl.className = childClass;
          childEl.textContent = child.label;
          childEl.dataset.id = child.id;
          childEl.addEventListener('click', (e) => {
            e.stopPropagation();
            if (editMode) handleChildCycle(child.id, node.id, node.phase);
          });
          childrenEl.appendChild(childEl);
        });

        innerEl.appendChild(childrenEl);
        wrapperEl.appendChild(innerEl);
        branchEl.appendChild(wrapperEl);
      }

      nodesRow.appendChild(branchEl);
    });

    tierEl.appendChild(nodesRow);
    tree.appendChild(tierEl);
  });

  updateStats();
}

// ===== COLLAPSE =====
function toggleCollapse(nodeId) {
  collapsed[nodeId] = !collapsed[nodeId];
  const wrapper = document.querySelector(`.children-wrapper[data-parent="${nodeId}"]`);
  const toggle = document.querySelector(`.node-toggle[data-node="${nodeId}"]`);
  if (wrapper) wrapper.classList.toggle('collapsed', collapsed[nodeId]);
  if (toggle) toggle.classList.toggle('collapsed', collapsed[nodeId]);
}

function toggleAllCollapse() {
  const allCollapsed = Object.values(collapsed).every(v => v);
  const newVal = !allCollapsed;
  knowledgeData.phases.forEach(p => p.nodes.forEach(n => { collapsed[n.id] = newVal; }));
  renderTree();
  document.getElementById('collapseBtn').textContent = newVal ? 'Expand All' : 'Collapse All';
}

// ===== MASTERY CYCLING =====
function handleNodeCycle(nodeId, phase) {
  const newState = cycleState(state[nodeId] || 0);
  state[nodeId] = newState;
  // Apply same state to all children
  knowledgeData.phases.forEach(p => p.nodes.forEach(n => {
    if (n.id === nodeId) n.children.forEach(c => { state[c.id] = newState; });
  }));
  renderTree();
  if (newState > 0) setTimeout(() => emitParticles(nodeId, newState), 50);
}

function handleChildCycle(childId, parentId, phase) {
  state[childId] = cycleState(state[childId] || 0);
  // Derive parent state from children
  let allMastered = true, anyInProgress = false;
  knowledgeData.phases.forEach(p => p.nodes.forEach(n => {
    if (n.id === parentId) {
      n.children.forEach(c => {
        const s = state[c.id] || 0;
        if (s !== STATE_MASTERED) allMastered = false;
        if (s === STATE_INPROGRESS) anyInProgress = true;
      });
    }
  }));
  if (allMastered) state[parentId] = STATE_MASTERED;
  else if (anyInProgress || state[parentId] === STATE_MASTERED) state[parentId] = STATE_INPROGRESS;
  else state[parentId] = STATE_UNLEARNED;

  renderTree();
  if (state[childId] > 0) setTimeout(() => emitParticlesOnChild(childId, state[childId]), 50);
}

// ===== PARTICLES =====
function emitParticles(nodeId, stateVal) {
  const card = document.querySelector(`.node-card[data-id="${nodeId}"]`);
  if (!card) return;
  card.classList.add('just-changed');
  setTimeout(() => card.classList.remove('just-changed'), 500);

  const container = card.querySelector('.particles');
  if (!container) return;
  const colorClass = stateVal === STATE_MASTERED ? 'emerald' : 'blue';
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = `particle ${colorClass}`;
    const angle = (Math.PI * 2 * i) / 10;
    const dist = 35 + Math.random() * 25;
    p.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
    p.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
    p.style.animationDelay = `${Math.random() * 0.15}s`;
    container.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

function emitParticlesOnChild(childId, stateVal) {
  const el = document.querySelector(`.child-node[data-id="${childId}"]`);
  if (!el) return;
  el.style.transform = 'scale(1.12)';
  setTimeout(() => { el.style.transform = ''; }, 250);
}

// ===== EDIT MODE =====
function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('editBtn');
  btn.classList.toggle('active', editMode);
  btn.textContent = editMode ? '● Editing' : 'Edit Mode';
}

// ===== STATS =====
function updateStats() {
  let total = 0, mastered = 0, inprogress = 0;
  knowledgeData.phases.forEach(phase => {
    phase.nodes.forEach(node => {
      node.children.forEach(child => {
        total++;
        const s = state[child.id] || 0;
        if (s === STATE_MASTERED) mastered++;
        else if (s === STATE_INPROGRESS) inprogress++;
      });
    });
  });
  document.getElementById('masteredCount').textContent = mastered;
  document.getElementById('inprogressCount').textContent = inprogress;
  document.getElementById('totalCount').textContent = total;
  const pct = total > 0 ? Math.round(((mastered + inprogress * 0.5) / total) * 100) : 0;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('progressLabel').textContent = `${pct}%`;
}

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// ===== INIT =====
loadState();
renderTree();
</script>
