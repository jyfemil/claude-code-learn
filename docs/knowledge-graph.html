<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Engineering — Knowledge Graph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --bg-void: #06070b;
  --bg-surface: #0c0e14;
  --bg-card: #11131c;
  --bg-card-hover: #161a26;
  --border-dim: #1a1e2e;
  --border-active: #2a3050;
  --text-primary: #e8eaf0;
  --text-secondary: #7a819e;
  --text-muted: #3e4460;
  --node-unlearned: #1c2030;
  --node-unlearned-border: #252a3c;
  --node-unlearned-text: #4a5070;
  --glow-cyan: #00e5ff;
  --glow-violet: #b388ff;
  --glow-amber: #ffab40;
  --glow-rose: #ff5277;
  --glow-emerald: #00e676;
  --glow-blue: #448aff;
  --phase1-color: #00e5ff;
  --phase2-color: #b388ff;
  --phase3-color: #ffab40;
  --mastered-color: #00e676;
  --font-display: 'Outfit', sans-serif;
  --font-body: 'Noto Sans SC', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; scroll-behavior: smooth; }

body {
  background: var(--bg-void);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: auto;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,229,255,0.03) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(179,136,255,0.02) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Grid background */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(6,7,11,0.92);
  backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border-dim);
  padding: 1rem 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 1.2rem;
}

.header-logo {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.3rem;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--glow-cyan), var(--glow-violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-subtitle {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.stats-badge {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-secondary);
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.stats-badge .count {
  color: var(--glow-emerald);
  font-weight: 500;
}

.btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 500;
  padding: 0.5rem 1rem;
  border-radius: 6px;
  border: 1px solid var(--border-dim);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}

.btn:hover {
  border-color: var(--border-active);
  color: var(--text-primary);
  background: var(--bg-card-hover);
}

.btn-edit {
  border-color: rgba(0,229,255,0.3);
  color: var(--glow-cyan);
}

.btn-edit:hover {
  background: rgba(0,229,255,0.08);
  border-color: rgba(0,229,255,0.5);
  box-shadow: 0 0 20px rgba(0,229,255,0.1);
}

.btn-edit.active {
  background: rgba(0,229,255,0.12);
  border-color: var(--glow-cyan);
  color: var(--glow-cyan);
  box-shadow: 0 0 20px rgba(0,229,255,0.15);
}

.btn-save {
  border-color: rgba(0,230,118,0.3);
  color: var(--glow-emerald);
}

.btn-save:hover {
  background: rgba(0,230,118,0.08);
  border-color: rgba(0,230,118,0.5);
}

/* ===== LEGEND ===== */
.legend {
  display: flex;
  gap: 1.5rem;
  padding: 0.8rem 2.5rem;
  border-bottom: 1px solid var(--border-dim);
  background: rgba(6,7,11,0.6);
  position: sticky;
  top: 54px;
  z-index: 99;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-secondary);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.legend-dot.unlearned { background: var(--node-unlearned); border: 1px solid var(--node-unlearned-border); }
.legend-dot.mastered { background: var(--glow-emerald); box-shadow: 0 0 8px var(--glow-emerald); }
.legend-dot.phase1 { background: var(--phase1-color); box-shadow: 0 0 8px var(--phase1-color); }
.legend-dot.phase2 { background: var(--phase2-color); box-shadow: 0 0 8px var(--phase2-color); }
.legend-dot.phase3 { background: var(--phase3-color); box-shadow: 0 0 8px var(--phase3-color); }

/* ===== GRAPH CONTAINER ===== */
.graph-container {
  position: relative;
  z-index: 1;
  padding: 3rem 2rem 4rem;
  overflow-x: auto;
  min-height: calc(100vh - 120px);
}

.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  min-width: fit-content;
}

/* ===== ROOT NODE ===== */
.root-node {
  position: relative;
  margin-bottom: 3rem;
}

.root-node .node-card {
  background: linear-gradient(135deg, rgba(0,229,255,0.06), rgba(179,136,255,0.06));
  border: 1px solid rgba(0,229,255,0.2);
  padding: 1.2rem 2.5rem;
  border-radius: 12px;
  text-align: center;
  cursor: default;
}

.root-node .node-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.4rem;
  background: linear-gradient(135deg, var(--glow-cyan), var(--glow-violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.root-node .node-subtitle {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 0.3rem;
  letter-spacing: 0.05em;
}

/* ===== TIER (PHASE) ROW ===== */
.tier {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 2.5rem;
  width: 100%;
}

.tier-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.3rem 1rem;
  border-radius: 20px;
  margin-bottom: 1.5rem;
}

.tier-label.phase1 { color: var(--phase1-color); background: rgba(0,229,255,0.06); border: 1px solid rgba(0,229,255,0.15); }
.tier-label.phase2 { color: var(--phase2-color); background: rgba(179,136,255,0.06); border: 1px solid rgba(179,136,255,0.15); }
.tier-label.phase3 { color: var(--phase3-color); background: rgba(255,171,64,0.06); border: 1px solid rgba(255,171,64,0.15); }
.tier-label.mastered { color: var(--mastered-color); background: rgba(0,230,118,0.06); border: 1px solid rgba(0,230,118,0.15); }

.tier-nodes {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 1400px;
}

/* ===== BRANCH (PARENT + CHILDREN) ===== */
.branch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.branch-connector {
  width: 1px;
  height: 16px;
  background: var(--border-dim);
  transition: background 0.6s;
}

.branch.has-mastered > .branch-connector {
  background: rgba(0,230,118,0.3);
  box-shadow: 0 0 4px rgba(0,230,118,0.2);
}

/* ===== NODE CARD ===== */
.node-card {
  position: relative;
  background: var(--node-unlearned);
  border: 1px solid var(--node-unlearned-border);
  border-radius: 10px;
  padding: 1rem 1.3rem;
  min-width: 180px;
  max-width: 220px;
  text-align: center;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  cursor: default;
  overflow: hidden;
}

.node-card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 11px;
  padding: 1px;
  background: transparent;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  transition: background 0.6s;
  pointer-events: none;
}

.node-card .node-icon {
  font-size: 1.4rem;
  margin-bottom: 0.5rem;
  filter: grayscale(1) opacity(0.4);
  transition: all 0.6s;
}

.node-card .node-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--node-unlearned-text);
  transition: color 0.4s;
  margin-bottom: 0.3rem;
}

.node-card .node-desc {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-muted);
  line-height: 1.5;
  transition: color 0.4s;
}

/* ===== CHILDREN ROW ===== */
.children {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 240px;
  padding-top: 0.5rem;
}

.child-node {
  position: relative;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  padding: 0.3rem 0.6rem;
  border-radius: 4px;
  background: rgba(28,32,48,0.6);
  border: 1px solid var(--node-unlearned-border);
  color: var(--text-muted);
  cursor: default;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  white-space: nowrap;
}

/* ===== EDIT MODE ===== */
body.edit-mode .node-card {
  cursor: pointer;
}

body.edit-mode .node-card:hover {
  border-color: var(--border-active);
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

body.edit-mode .child-node {
  cursor: pointer;
}

body.edit-mode .child-node:hover {
  border-color: var(--border-active);
  background: rgba(40,45,70,0.8);
  color: var(--text-secondary);
  transform: translateY(-1px);
}

/* ===== MASTERED STATE ===== */
.node-card.mastered {
  background: rgba(0,230,118,0.04);
  border-color: rgba(0,230,118,0.25);
  box-shadow:
    0 0 20px rgba(0,230,118,0.08),
    0 0 60px rgba(0,230,118,0.03),
    inset 0 0 30px rgba(0,230,118,0.02);
}

.node-card.mastered::before {
  background: linear-gradient(135deg, rgba(0,230,118,0.5), rgba(0,229,255,0.3), rgba(179,136,255,0.3));
  animation: borderRotate 4s linear infinite;
}

.node-card.mastered .node-icon {
  filter: none;
  animation: iconPulse 3s ease-in-out infinite;
}

.node-card.mastered .node-title {
  color: var(--glow-emerald);
  text-shadow: 0 0 20px rgba(0,230,118,0.3);
}

.node-card.mastered .node-desc {
  color: var(--text-secondary);
}

/* Mastered child node */
.child-node.mastered {
  background: rgba(0,230,118,0.08);
  border-color: rgba(0,230,118,0.3);
  color: var(--glow-emerald);
  box-shadow: 0 0 12px rgba(0,230,118,0.1);
}

/* Phase-specific mastered glow */
.node-card.mastered.phase1-glow {
  box-shadow: 0 0 25px rgba(0,229,255,0.1), 0 0 60px rgba(0,229,255,0.04);
}
.node-card.mastered.phase1-glow::before {
  background: linear-gradient(135deg, var(--glow-cyan), rgba(0,229,255,0.2), var(--glow-emerald));
}
.node-card.mastered.phase1-glow .node-title { color: var(--glow-cyan); text-shadow: 0 0 20px rgba(0,229,255,0.4); }

.node-card.mastered.phase2-glow {
  box-shadow: 0 0 25px rgba(179,136,255,0.1), 0 0 60px rgba(179,136,255,0.04);
}
.node-card.mastered.phase2-glow::before {
  background: linear-gradient(135deg, var(--glow-violet), rgba(179,136,255,0.2), var(--glow-emerald));
}
.node-card.mastered.phase2-glow .node-title { color: var(--glow-violet); text-shadow: 0 0 20px rgba(179,136,255,0.4); }

.node-card.mastered.phase3-glow {
  box-shadow: 0 0 25px rgba(255,171,64,0.1), 0 0 60px rgba(255,171,64,0.04);
}
.node-card.mastered.phase3-glow::before {
  background: linear-gradient(135deg, var(--glow-amber), rgba(255,171,64,0.2), var(--glow-emerald));
}
.node-card.mastered.phase3-glow .node-title { color: var(--glow-amber); text-shadow: 0 0 20px rgba(255,171,64,0.4); }

/* ===== IGNITE ANIMATION ===== */
@keyframes ignite {
  0% { transform: scale(1); }
  15% { transform: scale(1.06); }
  30% { transform: scale(1); }
  100% { transform: scale(1); }
}

@keyframes borderRotate {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

@keyframes iconPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.1); opacity: 0.9; }
}

@keyframes particleBurst {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(0,230,118,0.08), 0 0 60px rgba(0,230,118,0.03); }
  50% { box-shadow: 0 0 30px rgba(0,230,118,0.12), 0 0 80px rgba(0,230,118,0.05); }
}

.node-card.just-mastered {
  animation: ignite 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.node-card.mastered {
  animation: glowPulse 4s ease-in-out infinite;
}

/* Particle container */
.particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: visible;
  z-index: 10;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--glow-emerald);
  top: 50%;
  left: 50%;
  animation: particleBurst 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  box-shadow: 0 0 6px var(--glow-emerald);
}

/* ===== PROGRESS BAR ===== */
.progress-container {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(12,14,20,0.95);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-dim);
  border-radius: 12px;
  padding: 0.8rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  min-width: 320px;
}

.progress-bar-track {
  flex: 1;
  height: 4px;
  background: var(--bg-card);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--glow-cyan), var(--glow-emerald));
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 0 10px rgba(0,230,118,0.3);
}

.progress-text {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-secondary);
  white-space: nowrap;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  top: 5rem;
  right: 2rem;
  z-index: 200;
  background: rgba(12,14,20,0.95);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(0,230,118,0.3);
  border-radius: 8px;
  padding: 0.8rem 1.2rem;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--glow-emerald);
  transform: translateX(120%);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 0 30px rgba(0,230,118,0.1);
}

.toast.show {
  transform: translateX(0);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .tier-nodes { flex-direction: column; align-items: center; }
  .header { padding: 1rem 1.2rem; }
  .graph-container { padding: 2rem 1rem; }
  .legend { padding: 0.8rem 1.2rem; gap: 1rem; flex-wrap: wrap; }
}
</style>
</head>

<div class="header">

// ===== STATE MANAGEMENT =====
let state = {};
let editMode = false;

function loadState() {
  try {
    const saved = localStorage.getItem('knowledge-graph-state');
    if (saved) {
      state = JSON.parse(saved);
    } else {
      initStateFromData();
    }
  } catch (e) {
    initStateFromData();
  }
}

function initStateFromData() {
  state = {};
  knowledgeData.phases.forEach(phase => {
    phase.nodes.forEach(node => {
      state[node.id] = node.mastered;
      node.children.forEach(child => {
        state[child.id] = child.mastered;
      });
    });
  });
}

function saveState() {
  localStorage.setItem('knowledge-graph-state', JSON.stringify(state));
  showToast('Progress saved successfully');

  // Also try to save to file via companion server
  saveToFile();
}

async function saveToFile() {
  try {
    const response = await fetch('/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ state, timestamp: new Date().toISOString() })
    });
    if (response.ok) {
      showToast('Saved to disk ✓');
    }
  } catch (e) {
    // Companion server not running, localStorage is fine
  }
}

// ===== RENDERING =====
function renderTree() {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';

  // Root node
  const rootEl = document.createElement('div');
  rootEl.className = 'root-node';
  rootEl.innerHTML = `
    <div class="node-card">
      <div class="node-title">${knowledgeData.root.title}</div>
      <div class="node-subtitle">${knowledgeData.root.subtitle}</div>
    </div>
  `;
  tree.appendChild(rootEl);

  // Phase tiers
  knowledgeData.phases.forEach(phase => {
    const tierEl = document.createElement('div');
    tierEl.className = 'tier';

    const labelEl = document.createElement('div');
    labelEl.className = `tier-label ${phase.labelClass}`;
    labelEl.textContent = phase.label;
    tierEl.appendChild(labelEl);

    const nodesRow = document.createElement('div');
    nodesRow.className = 'tier-nodes';

    phase.nodes.forEach(node => {
      const branchEl = document.createElement('div');
      const hasMastered = state[node.id];
      branchEl.className = `branch${hasMastered ? ' has-mastered' : ''}`;

      const connectorEl = document.createElement('div');
      connectorEl.className = 'branch-connector';
      branchEl.appendChild(connectorEl);

      // Node card
      const cardEl = document.createElement('div');
      const isMastered = state[node.id];
      let cardClass = 'node-card';
      if (isMastered) cardClass += ` mastered ${node.phase}-glow`;
      cardEl.className = cardClass;
      cardEl.dataset.id = node.id;
      cardEl.onclick = () => handleNodeClick(node.id, node.phase);

      cardEl.innerHTML = `
        <div class="particles"></div>
        <div class="node-icon">${node.icon}</div>
        <div class="node-title">${node.title}</div>
        <div class="node-desc">${node.desc}</div>
      `;
      branchEl.appendChild(cardEl);

      // Children
      if (node.children && node.children.length > 0) {
        const childrenEl = document.createElement('div');
        childrenEl.className = 'children';

        node.children.forEach(child => {
          const childEl = document.createElement('div');
          let childClass = 'child-node';
          if (state[child.id]) childClass += ' mastered';
          childEl.className = childClass;
          childEl.textContent = child.label;
          childEl.dataset.id = child.id;
          childEl.dataset.parent = node.id;
          childEl.onclick = (e) => { e.stopPropagation(); handleChildClick(child.id, node.id, node.phase); };
          childrenEl.appendChild(childEl);
        });

        branchEl.appendChild(childrenEl);
      }

      nodesRow.appendChild(branchEl);
    });

    tierEl.appendChild(nodesRow);
    tree.appendChild(tierEl);
  });

  updateStats();
}

// ===== INTERACTIONS =====
function handleNodeClick(nodeId, phase) {
  if (!editMode) return;

  state[nodeId] = !state[nodeId];

  // If mastering parent, also master all children
  if (state[nodeId]) {
    knowledgeData.phases.forEach(p => {
      p.nodes.forEach(n => {
        if (n.id === nodeId) {
          n.children.forEach(c => { state[c.id] = true; });
        }
      });
    });
  }

  renderTree();

  if (state[nodeId]) {
    setTimeout(() => emitParticles(nodeId), 50);
  }
}

function handleChildClick(childId, parentId, phase) {
  if (!editMode) return;

  state[childId] = !state[childId];

  // Check if all children mastered → master parent
  let allChildrenMastered = true;
  knowledgeData.phases.forEach(p => {
    p.nodes.forEach(n => {
      if (n.id === parentId) {
        n.children.forEach(c => {
          if (!state[c.id]) allChildrenMastered = false;
        });
      }
    });
  });

  if (allChildrenMastered) {
    state[parentId] = true;
  } else if (!state[childId]) {
    // If unchecking a child, unmaster parent
    state[parentId] = false;
  }

  renderTree();

  if (state[childId]) {
    setTimeout(() => emitParticlesOnChild(childId), 50);
  }
}

function emitParticles(nodeId) {
  const card = document.querySelector(`.node-card[data-id="${nodeId}"]`);
  if (!card) return;

  card.classList.add('just-mastered');
  setTimeout(() => card.classList.remove('just-mastered'), 600);

  const particlesContainer = card.querySelector('.particles');
  if (!particlesContainer) return;

  for (let i = 0; i < 12; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    const angle = (Math.PI * 2 * i) / 12;
    const distance = 40 + Math.random() * 30;
    particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
    particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
    particle.style.animationDelay = `${Math.random() * 0.2}s`;
    particlesContainer.appendChild(particle);
    setTimeout(() => particle.remove(), 1000);
  }
}

function emitParticlesOnChild(childId) {
  const el = document.querySelector(`.child-node[data-id="${childId}"]`);
  if (!el) return;
  el.style.transform = 'scale(1.15)';
  setTimeout(() => { el.style.transform = ''; }, 300);
}

// ===== EDIT MODE =====
function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('editBtn');
  btn.classList.toggle('active', editMode);
  btn.textContent = editMode ? '● Editing' : 'Edit Mode';
}

// ===== STATS =====
function updateStats() {
  let total = 0;
  let mastered = 0;

  knowledgeData.phases.forEach(phase => {
    phase.nodes.forEach(node => {
      node.children.forEach(child => {
        total++;
        if (state[child.id]) mastered++;
      });
    });
  });

  document.getElementById('masteredCount').textContent = mastered;
  document.getElementById('totalCount').textContent = total;

  const pct = total > 0 ? Math.round((mastered / total) * 100) : 0;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('progressLabel').textContent = `${pct}% Complete`;
}

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== INIT =====
loadState();
renderTree();
